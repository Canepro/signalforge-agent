{{- if not .Values.agent.token.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "signalforge-agent.tokenSecretName" . }}
  labels:
    {{- include "signalforge-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.agent.token.secretKey }}: {{ required "Set agent.token.value or agent.token.existingSecret before installing the chart." .Values.agent.token.value | quote }}
{{- end }}
