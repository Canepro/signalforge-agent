nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/canepro/signalforge-agent
  tag: ""
  pullPolicy: Always
  pullSecrets: []

signalforge:
  baseUrl: ""

agent:
  token:
    existingSecret: ""
    secretKey: token
    value: ""
  kubeContextAlias: ""
  capabilities: collect:kubernetes-bundle,upload:multipart
  uploadTransport: curl
  workdir: /work
  extraEnv: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
