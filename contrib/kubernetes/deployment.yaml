apiVersion: v1
kind: Namespace
metadata:
  name: signalforge
  labels:
    app.kubernetes.io/name: signalforge-agent
    app.kubernetes.io/component: kubernetes-runner
---
apiVersion: v1
kind: Secret
metadata:
  name: signalforge-agent-token
  namespace: signalforge
type: Opaque
stringData:
  token: replace-me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalforge-agent-kubeconfig
  namespace: signalforge
data:
  kubeconfig: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: in-cluster
        cluster:
          server: https://kubernetes.default.svc
          certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    contexts:
      - name: in-cluster
        context:
          cluster: in-cluster
          user: signalforge-agent
    current-context: in-cluster
    users:
      - name: signalforge-agent
        user:
          tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signalforge-agent
  namespace: signalforge
  labels:
    app.kubernetes.io/name: signalforge-agent
    app.kubernetes.io/component: kubernetes-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: signalforge-agent-kubernetes-reader
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - persistentvolumes
      - persistentvolumeclaims
      - pods
      - events
      - services
      - resourcequotas
      - limitranges
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: signalforge-agent-kubernetes-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: signalforge-agent-kubernetes-reader
subjects:
  - kind: ServiceAccount
    name: signalforge-agent
    namespace: signalforge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signalforge-agent
  namespace: signalforge
  labels:
    app.kubernetes.io/name: signalforge-agent
    app.kubernetes.io/component: kubernetes-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signalforge-agent
      app.kubernetes.io/component: kubernetes-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signalforge-agent
        app.kubernetes.io/component: kubernetes-runner
    spec:
      serviceAccountName: signalforge-agent
      containers:
        - name: signalforge-agent
          image: signalforge-agent:replace-me
          imagePullPolicy: Always
          workingDir: /work
          args: ["run"]
          env:
            - name: SIGNALFORGE_URL
              value: https://signalforge.example.com
            - name: SIGNALFORGE_AGENT_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SIGNALFORGE_AGENT_TOKEN_FILE
              value: /var/run/signalforge-agent/token
            - name: SIGNALFORGE_KUBECONFIG
              value: /var/run/signalforge-agent/kubeconfig
            - name: SIGNALFORGE_AGENT_CAPABILITIES
              value: collect:kubernetes-bundle,upload:multipart
            - name: SIGNALFORGE_AGENT_UPLOAD_TRANSPORT
              value: curl
            - name: SIGNALFORGE_AGENT_WORKDIR
              value: /work
            - name: TMPDIR
              value: /work
          volumeMounts:
            - name: token
              mountPath: /var/run/signalforge-agent/token
              subPath: token
              readOnly: true
            - name: kubeconfig
              mountPath: /var/run/signalforge-agent/kubeconfig
              subPath: kubeconfig
              readOnly: true
            - name: workdir
              mountPath: /work
          securityContext:
            capabilities:
              drop: ["ALL"]
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: token
          secret:
            secretName: signalforge-agent-token
        - name: kubeconfig
          configMap:
            name: signalforge-agent-kubeconfig
        - name: workdir
          emptyDir: {}
